name: Generate CDN Links

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate links.csv
        shell: bash
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          OUT="links.csv"

          echo "Folder,CDN URL" > "$OUT"

          find . -type f \
            ! -path "./.git/*" \
            ! -path "./.github/*" \
            ! -name "links.csv" \
            | sed 's|^\./||' | sort | while read FILE
          do
            FOLDER=$(dirname "$FILE")/
            URL="https://cdn.jsdelivr.net/gh/${REPO}@${BRANCH}/${FILE}"
            echo "\"${FOLDER}\",\"${URL}\"" >> "$OUT"
          done

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update links.csv"
          file_pattern: links.csv
